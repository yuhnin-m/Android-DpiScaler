name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system libs (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .
          python -m pip check

      - name: Lint (ruff)
        run: ruff check core gui domain services infrastructure tests packaging/scripts main.py

      - name: Compile check
        run: python -m compileall main.py core gui domain services infrastructure tests packaging

      - name: Run tests
        run: python -m pytest -q

      - name: UI smoke (offscreen)
        if: runner.os != 'Windows'
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python - <<'PY'
          from PySide6.QtWidgets import QApplication
          from gui.main_window import MainWindow
          app = QApplication([])
          window = MainWindow()
          window.close()
          print("ui_smoke_ok")
          PY
