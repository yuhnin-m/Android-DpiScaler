name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
            artifact_name: linux
            build_cmd: bash packaging/scripts/build_linux.sh
          - os: macos-15
            label: macos-arm64
            artifact_name: macos-arm64
            build_cmd: MACOS_ARCH_SUFFIX=arm64 bash packaging/scripts/build_macos.sh
          - os: macos-15-intel
            label: macos-x64
            artifact_name: macos-x64
            build_cmd: MACOS_ARCH_SUFFIX=x64 bash packaging/scripts/build_macos.sh
          - os: windows-latest
            label: windows-x64
            artifact_name: windows
            build_cmd: ./packaging/scripts/build_windows.ps1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .
          python -m pip check

      - name: Build artifact
        run: ${{ matrix.build_cmd }}

      - name: Upload artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact_name }}
          path: artifacts/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-artifacts

      - name: Show release files
        run: ls -la release-artifacts

      - name: Generate checksums
        run: python packaging/scripts/generate_checksums.py release-artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          generate_release_notes: true
